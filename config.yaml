listen: "0.0.0.0:8320"
upstream: "http://host.docker.internal:8317"
database: "/data/usage.sqlite"
salt_file: "/data/salt"
queue_capacity: 1000
batch_size: 50
flush_interval: "1s"
max_nonstream_sample_bytes: 2097152
metering_enabled: true
webui:
  enabled: true
  base_path: "/metering"
pricing_file: "/data/pricing.yaml"
# Optional: map full HMAC-SHA256 API key hashes (64 lowercase hex chars) to display labels.
# Do not put plaintext API keys here. Labels load at process start only; no hot reload.
# key_labels:
#   "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef": "friend-a"
